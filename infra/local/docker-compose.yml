services:
  db:
    image: postgres:16
    container_name: locker_db
    environment:
      POSTGRES_USER: locker
      POSTGRES_PASSWORD: locker
      POSTGRES_DB: locker
    ports:
      - "5433:5432"
    volumes:
      - locker_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: locker_redis
    ports:
      - "6379:6379"

volumes:
  locker_pgdata:
